name: Build macOS DMG

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: Intel
            prefix: "arch -x86_64"
          - runner: macos-14
            arch: AppleSilicon
            prefix: ""
    runs-on: ${{ matrix.runner }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        ${{ matrix.prefix }} python -m pip install --upgrade pip --no-cache-dir
        # Install llama-cpp-python by compiling from source to avoid corrupted wheels and match Windows version
        if [ "${{ matrix.arch }}" = "AppleSilicon" ]; then
          CMAKE_ARGS="-DGGML_METAL=on" FORCE_CMAKE=1 ${{ matrix.prefix }} python -m pip install llama-cpp-python==0.3.28 --no-cache-dir
        else
          # Intel x86_64 emulato: llama-cpp 0.3.x usa scikit-build-core, che NON legge CMAKE_ARGS
          # ma le opzioni via --config-settings. Disabilito Metal/Accelerate/native (inutili in
          # emulazione: su Mac Intel l'inferenza va su CPU) e compilo in SERIALE (-j1) per evitare OOM.
          CMAKE_BUILD_PARALLEL_LEVEL=1 ${{ matrix.prefix }} python -m pip install llama-cpp-python==0.3.28 --no-cache-dir \
            --config-settings=cmake.define.GGML_METAL=OFF \
            --config-settings=cmake.define.GGML_ACCELERATE=OFF \
            --config-settings=cmake.define.GGML_NATIVE=OFF
        fi
        # Remove llama-cpp-python from requirements.txt to avoid overwriting or compiling from source
        sed -i '' '/llama-cpp-python/d' requirements.txt
        ${{ matrix.prefix }} pip install -r requirements.txt --no-cache-dir
        ${{ matrix.prefix }} pip install pyinstaller cython --no-cache-dir
        
    - name: Build protected app (Cython + PyInstaller)
      env:
        BUILD_ARCH_PREFIX: ${{ matrix.prefix }}
      run: |
        # Compila i moduli core in binari nativi (.so) e impacchetta: codice non decompilabile.
        python build_protected.py

    - name: Compress App Bundle
      run: |
        cd dist
        tar -czf ../Datarium_${{ matrix.arch }}.tar.gz Datarium.app

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-app-${{ matrix.arch }}
        path: Datarium_${{ matrix.arch }}.tar.gz

  package:
    needs: build
    runs-on: macos-latest
    steps:
    - name: Download Intel Artifact
      uses: actions/download-artifact@v4
      with:
        name: Datarium-app-Intel

    - name: Download AppleSilicon Artifact
      uses: actions/download-artifact@v4
      with:
        name: Datarium-app-AppleSilicon

    - name: Extract and Rename App Bundles
      run: |
        mkdir -p dmg_folder
        tar -xzf Datarium_Intel.tar.gz -C dmg_folder
        mv "dmg_folder/Datarium.app" "dmg_folder/Datarium (Intel).app"
        
        tar -xzf Datarium_AppleSilicon.tar.gz -C dmg_folder
        mv "dmg_folder/Datarium.app" "dmg_folder/Datarium (Apple Silicon).app"

    - name: Create Single Universal DMG
      run: |
        brew install create-dmg
        create-dmg \
          --volname "Datarium Installer" \
          --window-pos 200 120 \
          --window-size 650 450 \
          --icon-size 100 \
          --icon "Datarium (Apple Silicon).app" 150 150 \
          --icon "Datarium (Intel).app" 350 150 \
          --hide-extension "Datarium (Apple Silicon).app" \
          --hide-extension "Datarium (Intel).app" \
          --app-drop-link 550 150 \
          "Datarium_macOS.dmg" \
          "dmg_folder"

    - name: Upload Universal DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-macOS-Universal-DMG
        path: Datarium_macOS.dmg
