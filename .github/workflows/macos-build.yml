name: Build macOS DMG

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: Intel
            prefix: "arch -x86_64"
          - runner: macos-14
            arch: AppleSilicon
            prefix: ""
    runs-on: ${{ matrix.runner }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        ${{ matrix.prefix }} python -m pip install --upgrade pip --no-cache-dir
        # Install pre-compiled llama-cpp-python to avoid compilation delays and compiler errors
        if [ "${{ matrix.arch }}" = "AppleSilicon" ]; then
          ${{ matrix.prefix }} python -m pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/metal --no-cache-dir
        else
          # Use pre-compiled v0.3.2 wheel for Intel macOS to prevent compilation from source
          ${{ matrix.prefix }} python -m pip install llama-cpp-python==0.3.2 --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu --no-cache-dir
        fi
        # Remove llama-cpp-python from requirements.txt to avoid overwriting or compiling from source
        sed -i '' '/llama-cpp-python/d' requirements.txt
        ${{ matrix.prefix }} pip install -r requirements.txt --no-cache-dir
        ${{ matrix.prefix }} pip install pyinstaller pyarmor==9.2.4 --no-cache-dir
        
    - name: Build with PyInstaller
      run: |
        # Invece di PyArmor (che ha limiti di dimensione file per la versione trial), usiamo i file originali
        mkdir -p obfuscated
        cp main.py ai_engine.py license_manager.py face_memory.py report_generator.py obfuscated/
        cp icon.ico obfuscated/icon.ico
        
        # Bundling
        ${{ matrix.prefix }} pyinstaller --noconsole --onedir --noconfirm \
          --icon=icon.ico \
          --paths obfuscated \
          --collect-all customtkinter \
          --collect-all llama_cpp \
          --collect-all huggingface_hub \
          --collect-all certifi \
          --collect-all requests \
          --hidden-import customtkinter \
          --hidden-import llama_cpp \
          --hidden-import ai_engine \
          --hidden-import license_manager \
          --hidden-import face_memory \
          --hidden-import report_generator \
          --hidden-import PIL \
          --hidden-import fitz \
          --hidden-import docx \
          --hidden-import jwt \
          --hidden-import cryptography \
          --add-data "icon.ico:." \
          --add-data "assets:assets" \
          --add-data "obfuscated/ai_engine.py:." \
          --add-data "obfuscated/license_manager.py:." \
          --add-data "obfuscated/face_memory.py:." \
          --add-data "obfuscated/report_generator.py:." \
          --name "Datarium" \
          obfuscated/main.py

    - name: Compress App Bundle
      run: |
        cd dist
        tar -czf ../Datarium_${{ matrix.arch }}.tar.gz Datarium.app

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-app-${{ matrix.arch }}
        path: Datarium_${{ matrix.arch }}.tar.gz

  package:
    needs: build
    runs-on: macos-latest
    steps:
    - name: Download Intel Artifact
      uses: actions/download-artifact@v4
      with:
        name: Datarium-app-Intel

    - name: Download AppleSilicon Artifact
      uses: actions/download-artifact@v4
      with:
        name: Datarium-app-AppleSilicon

    - name: Extract and Rename App Bundles
      run: |
        mkdir -p dmg_folder
        tar -xzf Datarium_Intel.tar.gz -C dmg_folder
        mv "dmg_folder/Datarium.app" "dmg_folder/Datarium (Intel).app"
        
        tar -xzf Datarium_AppleSilicon.tar.gz -C dmg_folder
        mv "dmg_folder/Datarium.app" "dmg_folder/Datarium (Apple Silicon).app"

    - name: Create Single Universal DMG
      run: |
        brew install create-dmg
        create-dmg \
          --volname "Datarium Installer" \
          --window-pos 200 120 \
          --window-size 650 450 \
          --icon-size 100 \
          --icon "Datarium (Apple Silicon).app" 150 150 \
          --icon "Datarium (Intel).app" 350 150 \
          --hide-extension "Datarium (Apple Silicon).app" \
          --hide-extension "Datarium (Intel).app" \
          --app-drop-link 550 150 \
          "Datarium_macOS.dmg" \
          "dmg_folder"

    - name: Upload Universal DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-macOS-Universal-DMG
        path: Datarium_macOS.dmg
