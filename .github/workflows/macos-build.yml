name: Build macOS DMG

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install llama-cpp-python with Metal support
        CMAKE_ARGS="-DLLAMA_METAL=on" python -m pip install llama-cpp-python
        pip install -r requirements.txt
        pip install pyinstaller pyarmor==9.2.4
        
    - name: Build with PyInstaller
      run: |
        # Creiamo la cartella obfuscated 
        python -m pyarmor.cli gen -O obfuscated main.py ai_engine.py license_manager.py
        cp icon.ico obfuscated/icon.ico
        
        # Bundling
        pyinstaller --noconsole --onedir --noconfirm \
          --icon=icon.ico \
          --paths obfuscated \
          --collect-all customtkinter \
          --collect-all llama_cpp \
          --collect-all huggingface_hub \
          --collect-all certifi \
          --collect-all requests \
          --hidden-import customtkinter \
          --hidden-import llama_cpp \
          --hidden-import ai_engine \
          --hidden-import license_manager \
          --hidden-import PIL \
          --hidden-import fitz \
          --hidden-import docx \
          --hidden-import jwt \
          --hidden-import cryptography \
          --add-data "icon.ico:." \
          --add-data "obfuscated/ai_engine.py:." \
          --add-data "obfuscated/license_manager.py:." \
          --name "Datarium" \
          obfuscated/main.py

    - name: Create DMG
      run: |
        brew install create-dmg
        mkdir -p dist/dmg
        create-dmg \
          --volname "Datarium Installer" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "Datarium.app" 175 120 \
          --hide-extension "Datarium.app" \
          --app-drop-link 425 120 \
          "dist/Datarium_Mac_Universal.dmg" \
          "dist/Datarium.app"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-macOS-DMG
        path: dist/Datarium_Mac_Universal.dmg
