name: Build macOS DMG

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      # Non annullare l'altra architettura se una fallisce/resta in coda:
      # cosi' Apple Silicon completa comunque il suo artifact.
      fail-fast: false
      matrix:
        include:
          # Intel: runner NATIVO x86_64 (niente emulazione). Homebrew/OpenSSL sono x86_64,
          # quindi il link di llama-cpp riesce e la build e' identica a quella Apple Silicon.
          - runner: macos-13
            arch: Intel
          - runner: macos-14
            arch: AppleSilicon
    runs-on: ${{ matrix.runner }}
    # Rete di sicurezza: se il runner non parte o si impalla, fallisce dopo 90 min
    # invece di restare appeso all'infinito.
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip --no-cache-dir
        # llama-cpp-python compilato da sorgente su ciascun runner NATIVO (nessuna emulazione).
        # Apple Silicon: Metal acceso. Intel (macos-13 x86_64): compila come nativo, Homebrew/OpenSSL
        # sono x86_64 quindi il link riesce; Metal resta al default (innocuo, ripiega su CPU/BLAS).
        if [ "${{ matrix.arch }}" = "AppleSilicon" ]; then
          CMAKE_ARGS="-DGGML_METAL=on" FORCE_CMAKE=1 python -m pip install llama-cpp-python==0.3.28 --no-cache-dir
        else
          python -m pip install llama-cpp-python==0.3.28 --no-cache-dir
        fi
        # Remove llama-cpp-python from requirements.txt to avoid overwriting or compiling from source
        sed -i '' '/llama-cpp-python/d' requirements.txt
        pip install -r requirements.txt --no-cache-dir
        pip install pyinstaller cython --no-cache-dir
        
    - name: Build protected app (Cython + PyInstaller)
      run: |
        # Compila i moduli core in binari nativi (.so) e impacchetta: codice non decompilabile.
        # Runner nativo: nessun prefisso d'architettura necessario.
        python build_protected.py

    - name: Compress App Bundle
      run: |
        cd dist
        tar -czf ../Datarium_${{ matrix.arch }}.tar.gz Datarium.app

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-app-${{ matrix.arch }}
        path: Datarium_${{ matrix.arch }}.tar.gz

  package:
    needs: build
    runs-on: macos-latest
    steps:
    - name: Download Intel Artifact
      uses: actions/download-artifact@v4
      with:
        name: Datarium-app-Intel

    - name: Download AppleSilicon Artifact
      uses: actions/download-artifact@v4
      with:
        name: Datarium-app-AppleSilicon

    - name: Extract and Rename App Bundles
      run: |
        mkdir -p dmg_folder
        tar -xzf Datarium_Intel.tar.gz -C dmg_folder
        mv "dmg_folder/Datarium.app" "dmg_folder/Datarium (Intel).app"
        
        tar -xzf Datarium_AppleSilicon.tar.gz -C dmg_folder
        mv "dmg_folder/Datarium.app" "dmg_folder/Datarium (Apple Silicon).app"

    - name: Create Single Universal DMG
      run: |
        brew install create-dmg
        create-dmg \
          --volname "Datarium Installer" \
          --window-pos 200 120 \
          --window-size 650 450 \
          --icon-size 100 \
          --icon "Datarium (Apple Silicon).app" 150 150 \
          --icon "Datarium (Intel).app" 350 150 \
          --hide-extension "Datarium (Apple Silicon).app" \
          --hide-extension "Datarium (Intel).app" \
          --app-drop-link 550 150 \
          "Datarium_macOS.dmg" \
          "dmg_folder"

    - name: Upload Universal DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-macOS-Universal-DMG
        path: Datarium_macOS.dmg
