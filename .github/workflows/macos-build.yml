name: Build macOS DMG

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      # Non annullare l'altra architettura se una fallisce/resta in coda:
      # cosi' Apple Silicon completa comunque il suo artifact.
      fail-fast: false
      matrix:
        include:
          # Intel: runner arm64 VELOCE e disponibile, con emulazione x86_64 (Rosetta).
          # Evita la coda infinita dei runner Intel nativi (macos-13). Il link OpenSSL si
          # risolve nello step Install nascondendo OpenSSL dal filesystem.
          - runner: macos-14
            arch: Intel
            prefix: "arch -x86_64"
          - runner: macos-14
            arch: AppleSilicon
            prefix: ""
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        ${{ matrix.prefix }} python -m pip install --upgrade pip --no-cache-dir
        if [ "${{ matrix.arch }}" = "AppleSilicon" ]; then
          CMAKE_ARGS="-DGGML_METAL=on" FORCE_CMAKE=1 python -m pip install llama-cpp-python==0.3.28 --no-cache-dir
        else
          # Intel x86_64 emulato (Rosetta) sul runner arm64 VELOCE. Unico blocco storico: il
          # link finale contro OpenSSL di Homebrew, presente solo in arm64 sul runner. Datarium
          # NON usa il downloader interno di llama.cpp, quindi DISATTIVO OpenSSL: cpp-httplib
          # compila senza SSL e il link non chiede piu' libssl/libcrypto.
          # Lo faccio in modo RIDONDANTE e indipendente dall'immagine-runner (e' questo che
          # cambiava tra una run e l'altra), con 3 livelli:
          #  (1) nascondo OpenSSL da ENTRAMBI i prefix Homebrew (arm64 /opt/homebrew e
          #      Intel /usr/local) e da ogni punto che CMake/pkg-config controllano;
          #  (2) OPENSSL_ROOT_DIR fasullo;
          #  (3) CMAKE_DISABLE_FIND_PACKAGE_OpenSSL nella initial-cache: find_package lo
          #      rispetta a prescindere dal filesystem.
          for PREFIX in /opt/homebrew /usr/local; do
            for p in "$PREFIX/Cellar/openssl@3" "$PREFIX/Cellar/openssl@1.1" \
                     "$PREFIX/opt/openssl" "$PREFIX/opt/openssl@3" "$PREFIX/opt/openssl@1.1" \
                     "$PREFIX/include/openssl" \
                     "$PREFIX/lib/pkgconfig/openssl.pc" "$PREFIX/lib/pkgconfig/libssl.pc" \
                     "$PREFIX/lib/pkgconfig/libcrypto.pc"; do
              [ -e "$p" ] && sudo mv "$p" "$p.hidden" 2>/dev/null || true
            done
            for f in "$PREFIX"/lib/libssl*.dylib "$PREFIX"/lib/libcrypto*.dylib; do
              [ -e "$f" ] && sudo mv "$f" "$f.hidden" 2>/dev/null || true
            done
          done
          echo ">> OpenSSL residuo dopo l'hide (deve essere vuoto):"
          find /opt/homebrew/lib /usr/local/lib -maxdepth 1 \( -name 'libssl*' -o -name 'libcrypto*' \) 2>/dev/null || true
          # La compilazione emulata e' BALLERINA (la #56 identica passava, #57-#59 no): uso
          # un RETRY (3 tentativi) e PRODUCO la wheel x86_64 con 'pip wheel'. La wheel viene poi
          # caricata come artifact: appena un build va a buon fine, in futuro si installera'
          # direttamente la wheel pronta (1 min, niente piu' compilazione emulata).
          # -j1 seriale per contenere la memoria in emulazione.
          mkdir -p "$RUNNER_TEMP/wheelhouse"
          ok=""
          for attempt in 1 2 3; do
            echo "===== Build llama-cpp x86_64 0.3.28 - tentativo $attempt/3 ====="
            if OPENSSL_ROOT_DIR=/nonexistent CMAKE_BUILD_PARALLEL_LEVEL=1 \
                 arch -x86_64 python -m pip wheel "llama-cpp-python==0.3.28" --no-deps --no-cache-dir \
                 -w "$RUNNER_TEMP/wheelhouse" \
                 --config-settings=cmake.define.CMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON; then
              ok="yes"; break
            fi
            echo "Tentativo $attempt fallito, riprovo tra poco..."; sleep 10
          done
          if [ -z "$ok" ]; then echo "::error::Build llama-cpp x86_64 fallita dopo 3 tentativi"; exit 1; fi
          echo ">> Wheel prodotta:"; ls -la "$RUNNER_TEMP/wheelhouse"
          # Installo la wheel appena costruita in modo robusto: --find-links la trova per nome
          # nella wheelhouse (niente glob fragile) e scarica le dipendenze da PyPI.
          arch -x86_64 python -m pip install --no-cache-dir \
            --find-links "$RUNNER_TEMP/wheelhouse" "llama-cpp-python==0.3.28"
        fi
        # Remove llama-cpp-python from requirements.txt to avoid overwriting or compiling from source
        sed -i '' '/llama-cpp-python/d' requirements.txt
        ${{ matrix.prefix }} pip install -r requirements.txt --no-cache-dir
        ${{ matrix.prefix }} pip install pyinstaller cython --no-cache-dir

    - name: Build protected app (Cython + PyInstaller)
      env:
        BUILD_ARCH_PREFIX: ${{ matrix.prefix }}
      run: |
        # Compila i moduli core in binari nativi (.so) e impacchetta: codice non decompilabile.
        # Su Intel, build_protected.py antepone "arch -x86_64" via BUILD_ARCH_PREFIX.
        python build_protected.py

    - name: Compress App Bundle
      run: |
        cd dist
        tar -czf ../Datarium_${{ matrix.arch }}.tar.gz Datarium.app

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-app-${{ matrix.arch }}
        path: Datarium_${{ matrix.arch }}.tar.gz

  package:
    needs: build
    runs-on: macos-latest
    steps:
    - name: Download Intel Artifact
      uses: actions/download-artifact@v4
      with:
        name: Datarium-app-Intel

    - name: Download AppleSilicon Artifact
      uses: actions/download-artifact@v4
      with:
        name: Datarium-app-AppleSilicon

    - name: Extract and Rename App Bundles
      run: |
        mkdir -p dmg_folder
        tar -xzf Datarium_Intel.tar.gz -C dmg_folder
        mv "dmg_folder/Datarium.app" "dmg_folder/Datarium (Intel).app"
        
        tar -xzf Datarium_AppleSilicon.tar.gz -C dmg_folder
        mv "dmg_folder/Datarium.app" "dmg_folder/Datarium (Apple Silicon).app"

    - name: Create Single Universal DMG
      run: |
        brew install create-dmg
        create-dmg \
          --volname "Datarium Installer" \
          --window-pos 200 120 \
          --window-size 650 450 \
          --icon-size 100 \
          --icon "Datarium (Apple Silicon).app" 150 150 \
          --icon "Datarium (Intel).app" 350 150 \
          --hide-extension "Datarium (Apple Silicon).app" \
          --hide-extension "Datarium (Intel).app" \
          --app-drop-link 550 150 \
          "Datarium_macOS.dmg" \
          "dmg_folder"

    - name: Upload Universal DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Datarium-macOS-Universal-DMG
        path: Datarium_macOS.dmg
